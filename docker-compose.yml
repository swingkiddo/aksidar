services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    command: npm run dev

  python-processor:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - ./public/images:/app/public/images
    profiles:
      - manual

networks:
  default:
    name: dar-kosmetik-network
